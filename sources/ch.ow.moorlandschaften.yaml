layers:
  - name: ch.ow.moorlandschaften
    title: Moorlandschaften (OW054)
    layers:
      - name: ch.ow.moorlandschaften-glaubenberg
        title: Moorlandschaften Glaubenberg
        legendurl: https://www.gis-daten.ch/docs/ow/wms/moorlandschaften-glaubenberg.png 
        sources:
          - ch.ow.moorlandschaften-glaubenberg
      - name: ch.ow.moorlandschaften-national
        title: Moorlandschaften national
        legendurl: https://www.gis-daten.ch/docs/ow/wms/moorlandschaften-national.png 
        sources:
          - ch.ow.moorlandschaften-national

sources:
  ch.ow.moorlandschaften-glaubenberg:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: 'show:2'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_fach/ow_natur_landschaftsschutz/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *bboxow 

  ch.ow.moorlandschaften-national:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: 'show:3'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_fach/ow_natur_landschaftsschutz/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *bboxow 
