sources:
  # Anlagen und Anlageteile
  ch.ow.sanierung-wasserkraft-anlagen:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: 'show:0'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_fach/ow_wasserkraft/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *bboxow

  # Sanierungspflicht Wasserkraftzentralen (Strategische Planung 2014)
  ch.ow.sanierung-wasserkraft-sanierungspflicht-wasserkraftzentralen:
    type: arcgis
    http:
