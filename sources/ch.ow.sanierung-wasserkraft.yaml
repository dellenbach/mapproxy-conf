layers:
  - name: ch.ow.sanierung-wasserkraft
    title: Planung und Berichterstattung der Sanierung Wasserkraft (CH192)
    layers:
      - name: ch.ow.sanierung-wasserkraft-anlagen
        title: Anlagen und Anlageteile
        legendurl: https://www.gis-daten.ch/docs/ow/wms/sanierung-wasserkraft-anlagen.png 
        sources:
          - ch.ow.sanierung-wasserkraft-anlagen
      - name: ch.ow.sanierung-wasserkraft-sanierungspflicht-wasserkraftzentralen
        title: Sanierungspflicht Wasserkraftzentralen (Strategische Planung 2014)
        legendurl: https://www.gis-daten.ch/docs/ow/wms/sanierung-wasserkraft-sanierungspflicht-wasserkraftzentralen.png 
