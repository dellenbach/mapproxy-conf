        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_fach/ow_wasserkraft/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *bboxow 

  # Sanierungspflicht Wasserfassungen (Strategische Planung 2014)
