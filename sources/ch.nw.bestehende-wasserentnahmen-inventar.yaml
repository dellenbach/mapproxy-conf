layers:
  - name: ch.nw.bestehende-wasserentnahmen-inventar  
    title: Bestehende Wasserentnahmen (Inventar) (CH140)
    layers:
      - name: ch.nw.bestehende-wasserentnahmen-inventar-entnahmen  
        title: Entnahmen
        layers:
          - name: ch.nw.bestehende-wasserentnahmen-inventar-entnahmen-wasserkraftnutzung  
            title: Wasserkraftnutzung
            legendurl: https://www.gis-daten.ch/docs/nw/wms/bestehende-wasserentnahmen-inventar-entnahmen-wasserkraftnutzung.png 
            sources:
              - ch.nw.bestehende-wasserentnahmen-inventar-entnahmen-wasserkraftnutzung 
          - name: ch.nw.bestehende-wasserentnahmen-inventar-entnahmen-andere  
