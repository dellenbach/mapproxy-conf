sources:

  # ENTNAHMEN
  # Wasserkraftnutzung
  ch.nw.bestehende-wasserentnahmen-inventar-entnahmen-wasserkraftnutzung:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: 'show:1'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_fach/nw_inventar_wasserentnahmen/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *bboxnw 

  # Andere Nutzungen
  ch.nw.bestehende-wasserentnahmen-inventar-entnahmen-andere:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: 'show:2'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_fach/nw_inventar_wasserentnahmen/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *bboxnw 

  # RÜCKGABEN
  ch.nw.bestehende-wasserentnahmen-inventar-rueckgaben:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: 'show:3'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_fach/nw_inventar_wasserentnahmen/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *bboxnw  