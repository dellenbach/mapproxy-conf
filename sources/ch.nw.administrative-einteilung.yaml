sources:

# Adressen / Strassen
  ch.nw.administrative-einteilung-adressen:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: 'show:1'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_basis/plan_fuer_grundbuch_bund_dynamisch_nw/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *bboxnw  

# PLZ Ortschaften
