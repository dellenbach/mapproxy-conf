sources:
  # SYNOPTISCH
  ch.ow.gefahrenkarte-gefahrenstufe-synoptisch:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: 'show:2'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_fach/ow_naturgefahren/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *bboxow 

