layers:
  - name: ch.nwow.basisplan-gis-farbig
    title: Basisplan GIS farbig NW und OW
    sources:
      - ch.nwow.basisplan-gis-farbig.cache
      - ch.nw.basisplan_gis_farbig
      - ch.ow.basisplan_gis_farbig
      - ch.nw_basisplan_gis_dynamisch
      - ch.ow_basisplan_gis_dynamisch
  - name: ch.ow.leitungskataster
    title: Leitungskataster OW
    sources:
      - ch.ow_lkat
      - ch.nw_lkat
sources:
  ch.nw.basisplan_gis_farbig:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    min_scale: 1
    max_scale: 7500
    req:
      layers: '1,2'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_basis/nw_basisplan_gis_farbig/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *ref_0
  ch.nw_basisplan_gis_dynamisch:
