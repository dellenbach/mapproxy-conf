services:
  demo: null
  wms:
    versions:
      - 1.3.0
      - 1.1.1
    srs:
      - 'EPSG:2056'
      - 'EPSG:21781'
      - 'EPSG:4326'
      - 'EPSG:4258'
      - 'CRS:84'
      - 'EPSG:3857'
      - 'EPSG:900913'
    bbox_srs:
      - 'EPSG:2056'
    image_formats:
      - image/jpeg
      - image/png
      - image/gif
      - image/GeoTIFF
      - image/tiff
    attribution:
      text: 'Rasterdaten (c) swisstopo, AV-Daten (c) GIS Daten AG'
    on_source_errors: raise
    strict: false
    featureinfo_types:
      - text
      - xml
    md:
      title: GIS Daten AG WMS
      abstract: WMS Dienste
      online_resource: 'https://www.gis-daten.ch'
      contact:
        person: Del
        position: null
        organization: GIS Daten AG
        address: Aemaettlistrasse 2
        city: Stans
        postcode: 6370
        country: Switzerland
        phone: +49(0)000-000000-0
        fax: +49(0)000-000000-0
        email: support@gis-daten.ch
      access_constraints: Insert license and copyright information for this service.
      fees: See xxx
layers:
  - name: ch.nw.nutzungsplanung
    title: Nutzungsplanung Nidwalden
    sources:
      - ch.nw.nutzungsplanung
      - ch.ow.nutzungsplanung
  - name: ch.nw.nutzungsplanung_merged
    title: Nutzungsplanung mit Grundsituation
    sources:
      - ch.nw.nutzungsplanung
      - ch.nw.basisplan_gis_transparent
  - name: ch.lu.grundbuchplan
    title: Grundbuchplan LU
    sources:
      - ch.lu.grundbuchplan
  - name: ch.nwowlu.grundbuchplan
    title: Grundbuchplan NWOWLU
    sources:
      - ch.lu.grundbuchplan
      - ch.ow.grundbuchplan
      - ch.nw.grundbuchplan
http:
  ssl_no_cert_checks: true
parts:
  coverages:
    bboxnw: &ref_1
      bbox:
        - 2643483
        - 1171738
        - 2702269
        - 1216819
      srs: 'EPSG:2056'
    bboxow: &ref_2
      bbox:
        - 2643483
        - 1171738
        - 2702269
        - 1216819
      srs: 'EPSG:2056'
    bboxnwow:
      bbox:
        - 2643483
        - 1171738
        - 2702269
        - 1216819
      srs: 'EPSG:2056'
    bboxlu: &ref_0
      bbox:
        - 2630127
        - 1180568
        - 2681764
        - 1237690
      srs: 'EPSG:2056'
sources:
  ch.swisstopo.pixelkarte:
    type: tile
    grid: GLOBAL_WEBMERCATOR
    url: 'http://a.tile.openstreetmap.org/%(z)s/%(x)s/%(y)s.png'
  ch.lu.grundbuchplan:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: '1,2'
      url: 'http://svc.geo.lu.ch/main/rest/services/basis/basis_gbplan/MapServer'
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *ref_0
  ch.nw.grundbuchplan:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: '1,2'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_basis/plan_fuer_grundbuch_bund_nw/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *ref_1
  ch.ow.grundbuchplan:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: '1,2'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_basis/plan_fuer_grundbuch_bund_ow/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *ref_2
  ch.nw.basisplan_gis_transparent:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: '1,2'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_basis/nw_basisplan_gis_transparent_nocache/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *ref_1
  ch.nw.nutzungsplanung:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: '1,2'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_oereb/nw_nutzungsplanung_oereb_DEF/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *ref_1
  ch.ow.nutzungsplanung:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: '1,2'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_oereb/ow_nutzungsplanung_oereb_DEF/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *ref_1
