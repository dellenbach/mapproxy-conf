base:
  - base/globals.yaml
  - base/grids.yaml
services:
  demo: null
  wms:
    versions:
      - 1.3.0
      - 1.1.1
    srs:
      - 'EPSG:2056'
      - 'EPSG:21781'
    bbox_srs:
      - 'EPSG:2056'
    image_formats:
      - image/jpeg
      - image/png
      - image/gif
      - image/GeoTIFF
      - image/tiff
    attribution:
      text: ''
    on_source_errors: raise
    strict: false
    featureinfo_types:
      - text
      - xml
    md:
      title: WMS Basisdaten (nur fuer interne Zwecke)
      abstract: WMS Dienste fuer Trigonet AG
      online_resource: 'https://www.trigonet.ch'
      contact:
        organization: Trigonet AG
        address: Aemaettlistrasse 2
        city: Stans
        postcode: 6370
        country: Switzerland
        phone: +41 (0)41 618 61 10
        email: support@trigonet.ch
      access_constraints: Dieser WMS darf nur fuer Dataver der Tagmar AG benutzt verwendet werden.
