layers:
  - name: basisplan
    title: Basisplan intern
    sources:
      - ch.lu.luz_basisplan_gis_farbig
      - ch.lu.luz_basisplan_gis_dynamisch
  - name: abwasser
    title: Abwasser mit Basisplan intern
    sources:
      - ch.lu.luz_basisplan_gis_farbig
      - ch.lu.luz_basisplan_gis_dynamisch
  - name: orthofoto
    title: Orthofoto LU
    sources:
      - ch.lu.orthofoto
sources:
  ch.lu.luz_basisplan_gis_farbig:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: all
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/tn_basis/luz_basisplan_gis_farbig/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: false
    supported_srs:
      - 'EPSG:2056'
    coverage: *ref_0
  ch.lu.luz_basisplan_gis_dynamisch:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: all
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/tn_basis/luz_basisplan_gis_dynamisch/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: false
    supported_srs:
      - 'EPSG:2056'
    coverage: *ref_0
  ch.lu.orthofoto:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: '1,2'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/tn_basis/lu_swissimage/MapServer
      transparent: false
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: false
    supported_srs:
      - 'EPSG:2056'
    coverage: *ref_0
grids:
  webmercator:
    base: GLOBAL_WEBMERCATOR
  epsg_2056:
    res:
      - 66.1459656252646
      - 39.687579375158755
      - 26.458386250105836
      - 13.229193125052918
      - 6.614596562526459
      - 3.9687579375158752
    bbox:
      - 2480000
      - 1062000
      - 2865000
      - 1302000
    bbox_srs: 'EPSG:2056'
    srs: 'EPSG:2056'
    origin: nw
globals:
  srs:
    axis_order_en:
      - 'EPSG:21781'
      - 'EPSG:2056'
  cache:
    base_dir: ./cache_data
    lock_dir: ./cache_data/locks
    tile_lock_dir: ./cache_data/tile_locks
    meta_size:
      - 4
      - 4
    meta_buffer: 80
  image:
    resampling_method: bicubic
    stretch_factor: 1.15
    max_shrink_factor: 4
    paletted: false
    formats:
      custom_format:
        format: image/png
        mode: P
        colors: 32
        transparent: true
        encoding_options:
          quantizer: fastoctree
      image/jpeg:
        encoding_options:
          jpeg_quality: 80
