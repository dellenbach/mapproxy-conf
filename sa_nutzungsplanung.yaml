        req:
          layers: show:0
          url: >-
            https://www.geohost.ch/svc/rest/services/ow_gemeinden/sa_nutzungsplanung_WORK_DEF_DIFF_View/MapServer
          transparent: true
        opts:
          featureinfo: true
          featureinfo_tolerance: 10
          featureinfo_return_geometries: true
        image:
          opacity: 0.8
        supported_srs:
