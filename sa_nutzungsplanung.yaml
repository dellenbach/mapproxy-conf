        - 1242000
      srs: 'EPSG:2056'
    bboxclip: &bboxclip
      bbox:
        - 2660000
        - 1172000
        - 2680000
        - 1200000
      srs: 'EPSG:2056'
    bboxch: &bboxch
      bbox:
        - 2480000
        - 1062000
        - 2865000
        - 1302000
      srs: 'EPSG:2056'
layers:
