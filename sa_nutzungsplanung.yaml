base:
  - base/globals.yaml
  - base/grids.yaml
services:
  demo: null
  wms:
    versions:
      - 1.3.0
      - 1.1.1
    # supported SRS for this WMS
    srs: ['EPSG:2056','EPSG:21781','EPSG:4326','CRS:84','EPSG:3857','EPSG:900913']
    bbox_srs:
      - 'EPSG:2056'
    image_formats:
      - image/jpeg
      - image/png
      - image/gif
      - image/GeoTIFF
      - image/tiff
    attribution:
      text: ''
    on_source_errors: raise
    strict: false
    featureinfo_types: [ 'text', 'xml', 'json' ]
    md:
      title: Nutzungsplanung Sarnen (Laufende Änderungen)
      abstract: WMS Dienst mit der Nutzungsplanung von Sarnen
      online_resource: 'https://www.gis-daten.ch'
      contact:
        organization: GIS Daten AG
        address: Aemaettlistrasse 2
        city: Stans
        postcode: 6370
        country: Switzerland
        phone: +41 (0)41 618 61 12
        email: support@gis-daten.ch
parts:
  coverages:
    bboxnw: &bboxnw
      bbox:
        - 2643483
        - 1171738
        - 2702269
        - 1216819
      srs: 'EPSG:2056'
    bboxow: &bboxow
      bbox:
