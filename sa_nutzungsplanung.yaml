      - 50
      - 20
      - 10
      - 5
      - 2.5
      - 2
      - 1.5
    bbox:
      - 2480000
      - 1062000
      - 2865000
      - 1302000
    bbox_srs: 'EPSG:2056'
    srs: 'EPSG:2056'
    origin: nw
globals:
  srs:
    axis_order_en:
      - 'EPSG:21781'
      - 'EPSG:2056'
  cache:
    base_dir: /mapproxy/cache_data
    lock_dir: /mapproxy/cache_data/locks
    tile_lock_dir: /mapproxy/cache_data/tile_locks
    meta_size:
      - 4
      - 4
    meta_buffer: 80
  image:
    resampling_method: bicubic
    stretch_factor: 1.15
    max_shrink_factor: 4
