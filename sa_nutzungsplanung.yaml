sources:
  ch.basisplan_gis_grau_src:
        type: arcgis
        http:
           ssl_no_cert_checks: true
           client_timeout: 600 # seconds
           headers:
               X-Esri-Authorization: Bearer v0LwVyMyfXOfsEeT9I-R7jVOUNAsPB7fLSn3Thc0Z2djY-hH9wMObVckGfxHYkzH
        req:
          layers: all
          url: >-
            https://www.geohost.ch/svc/rest/services/gis_basis/ow_basisplan_gis_grau/MapServer
          transparent: true
        opts:
          featureinfo: true
          featureinfo_tolerance: 10
          featureinfo_return_geometries: true
        supported_srs:
          - 'EPSG:2056'
        coverage: *bboxch
        
  ch.nutzungsplanung_differenz_src:
