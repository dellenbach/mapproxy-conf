caches:
  ch.trigonet.basisplan.cache:
    grids: [epsg_2056]
    bulk_meta_tiles: true
    sources: [ch.zg.grundbuchplan,ch.nw.grundbuchplan,ch.ow.grundbuchplan,ch.lu.grundbuchplan,ch.swisstopo.pixelkarte-grau-pk1000.noscale]
    cache:
      # type: sqlite
      type: compact
      version: 2


grids:
    webmercator:
        base: GLOBAL_WEBMERCATOR
    #lowres_lv95:
    epsg_2056:
      #res: [4000,3750,3500,3250,3000,2750,2500,2250,2000,1750,1500,1250,1000,750,650,500,250,100,50,20,10,5,2.5,2,1.5,1,0.5,0.25,0.1]
      #threshold_res: [900,700,400,200,90,40,15,7.5,3,1.8,1.3,0.75,0.4,0.15]
      #bbox: [2420000.0, 1030000.0, 2900000.0, 1350000.0]
      #res:  [66.1459656252646, 39.687579375158755, 26.458386250105836, 13.229193125052918, 6.614596562526459, 3.9687579375158752, 2.6458386250105836, 1.3229193125052918, 0.7937515875031751, 0.5291677250021167, 0.26458386250105836, 0.13229193125052918, 0.06614596562526459]
      res:  [66.1459656252646, 39.687579375158755, 26.458386250105836, 13.229193125052918, 6.614596562526459, 3.9687579375158752]
      bbox: [2480000, 1062000, 2865000, 1302000]
      bbox_srs: EPSG:2056
      srs: EPSG:2056
      origin: nw
      #stretch_factor: 1.10
globals:
  srs:
    axis_order_en: ['EPSG:21781', 'EPSG:2056']
    # override system projection file
    #proj_data_dir: '/path to dir that contains epsg file'

  # cache options
  cache:
    # where to store the cached images
    base_dir: './cache_data'
    # where to store lockfiles for concurrent_requests
    lock_dir: './cache_data/locks'
    # where to store lockfiles for tile creation
    tile_lock_dir: './cache_data/tile_locks'

    # request x*y tiles in one step
    meta_size: [4, 4]
    # add a buffer on all sides (in pixel) when requesting
    # new images
    meta_buffer: 80


  # image/transformation options
  image:
    # use best resampling for vector data
    resampling_method: bicubic # nearest/bilinear
    # stretch cached images by this factor before
    # using the next level
    stretch_factor: 1.15
    # shrink cached images up to this factor before
    # returning an empty image (for the first level)
    max_shrink_factor: 4.0

    # Enable 24bit PNG images. Defaults to true (8bit PNG)
    paletted: false
    formats:
      custom_format:
        format: image/png
        # the custom format will be stored as 8bit PNG
        mode: P
        colors: 32
        transparent: true
        encoding_options:
        # The algorithm used to quantize (reduce) the image colors
          quantizer: fastoctree
      # edit an existing format
      image/jpeg:
        encoding_options:
          # jpeg quality [0-100]
          jpeg_quality: 80
