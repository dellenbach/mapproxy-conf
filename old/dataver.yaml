# -------------------------------
# MapProxy example configuration.
# -------------------------------
#
# This is a minimal MapProxy configuration.
# See full_example.yaml and the documentation for more options.
#

# Starts the following services:
# Demo:
#     http://localhost:8080/demo
# WMS:
#     capabilities: http://localhost:8080/service?REQUEST=GetCapabilities
# WMTS:
#     capabilities: http://localhost:8080/wmts/1.0.0/WMTSCapabilities.xml
#     first tile: http://localhost:8080/wmts/osm/webmercator/0/0/0.png
# Tile service (compatible with OSM/etc.)
#     first tile: http://localhost:8080/tiles/osm/webmercator/0/0/0.png
# TMS:
#     note: TMS is not compatible with OSM/Google Maps/etc.
#     fist tile: http://localhost:8080/tms/1.0.0/osm/webmercator/0/0/0.png
# KML:
#     initial doc: http://localhost:8080/kml/osm/webmercator



services:
  demo:
  wms:
    # only offer WMS 1.1.1
    versions: ['1.3.0', '1.1.1']

    # supported SRS for this WMS
    srs: ['EPSG:2056','EPSG:21781','EPSG:4326','CRS:84','EPSG:3857','EPSG:900913']

    # force the layer extents (BBOX) to be displayed in this SRS
    bbox_srs: ['EPSG:2056']

    # limit the supported image formats.
    image_formats: ['image/jpeg', 'image/png', 'image/gif', 'image/GeoTIFF', 'image/tiff']

    # add attribution text in the lower-right corner.
    attribution:
      text: ''
    # text: 'Rasterdaten (c) swisstopo, AV-Daten (c) GIS Daten AG'

    # return an OGC service exception when one or more sources return errors
    # or no response at all (e.g. timeout)
    on_source_errors: raise

    # some WMS clients do not send all required parameters in feature info
    # requests, MapProxy ignores these errors unless you set strict to true.
    strict: false

    # list of feature info types the server should offer
    featureinfo_types: ['text', 'html', 'xml']

    md:
      # metadata used in capabilities documents
      title: GIS Daten AG WMS
      abstract: WMS Dienste
      online_resource: https://www.gis-daten.ch
      contact:
        person: Del
        position:
        organization: GIS Daten AG
        address: Aemaettlistrasse 2
        city: Stans
        postcode: 6370
        country: Switzerland
        phone: 0041416186111
        fax: +49(0)000-000000-0
        email: support@gis-daten.ch
      # multiline strings are possible with the right indention
      access_constraints:
        Insert license and copyright information for this service.
      fees: 'See xxx'

parts:
  coverages:
      bboxnw: &bboxnw
          bbox: [2643483, 1171738, 2702269, 1216819]
          srs: 'EPSG:2056'
      bboxow: &bboxow
          bbox: [2643483, 1171738, 2702269, 1216819]
          srs: 'EPSG:2056'
      bboxnwow: &bboxnwow
          bbox: [2643483, 1171738, 2702269, 1216819]
          srs: 'EPSG:2056'
      bboxlu: &bboxlu
          bbox: [2630127, 1180568, 2681764, 1237690]
          srs: 'EPSG:2056'
      bboxclip: &bboxclip
          bbox: [2660000, 1172000, 2680000, 1200000]
          #datasource: Point(2660000, 1172000).buffer(2000)
          srs: 'EPSG:2056'

layers:
  - name: ch.nwow.orthofoto
    title: Orthofoto Nidwalden und Obwalden
    sources: [ch.nwow.orthofoto]

  - name: ch.ow.abwasser
    title: Abwasser Obwalden
    sources: [ch.ow.grundbuchplan_opaque,ch.ow.abwasser]

  - name: ch.nwow.grundbuchplan
    title: Grundbuchplan NWOW
    sources: [ch.ow.grundbuchplan,ch.nw.grundbuchplan]

#http:
#    ssl_no_cert_checks: true



sources:
  ch.nwow.orthofoto:
    type: arcgis
    req:
      layers: all
      url: http://arcgis-trigonet.geocentrale.com:6080/arcgis/rest/services/gis_basis/basislayer_orthophoto/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: false
    ##supported_srs: ['EPSG:2056','EPSG:21781']
    #grid: epsg_2056
    coverage: *bboxnwow

  ch.nw.grundbuchplan:
    type: arcgis
    req:
      layers: all
      url: http://arcgis-trigonet.geocentrale.com:6080/arcgis/rest/services/gis_basis/plan_fuer_grundbuch_bund_nw/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: false
    ##supported_srs: ['EPSG:2056','EPSG:21781']
    #grid: epsg_2056
    coverage: *bboxnw

  ch.ow.grundbuchplan_opaque:
    type: arcgis
    #image:
      #opacity: 0.2
      #transparent_color: [0, 0, 0]
      #transparent_color_tolerance: 50
      #interpolation: RSP_CubicConvolution
    req:
      layers: all
      url: http://arcgis-trigonet.geocentrale.com:6080/arcgis/rest/services/gis_basis/plan_fuer_grundbuch_bund_ow/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: false
    ##supported_srs: ['EPSG:2056','EPSG:21781']
    #grid: epsg_2056
    coverage: *bboxow

  ch.ow.grundbuchplan:
    type: arcgis
    req:
      layers: all
      url: http://arcgis-trigonet.geocentrale.com:6080/arcgis/rest/services/gis_basis/plan_fuer_grundbuch_bund_ow/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: false
    ##supported_srs: ['EPSG:2056','EPSG:21781']
    #grid: epsg_2056
    coverage: *bboxow


  ch.ow.abwasser:
    type: arcgis
    #image:
      #opacity: 0.2
      #transparent_color: [0, 0, 255]
      #transparent_color_tolerance: 10
      #interpolation: RSP_CubicConvolution
    req:
      layers: all
      url: http://arcgis-trigonet.geocentrale.com:6080/arcgis/rest/services/gis_fach/ow_abwasser/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: false
    ##supported_srs: ['EPSG:2056','EPSG:21781']
    #grid: epsg_2056
    coverage: *bboxow


grids:
    webmercator:
        base: GLOBAL_WEBMERCATOR
    #lowres_lv95:
    epsg_2056:
      #res: [4000,3750,3500,3250,3000,2750,2500,2250,2000,1750,1500,1250,1000,750,650,500,250,100,50,20,10,5,2.5,2,1.5,1,0.5,0.25,0.1]
      #threshold_res: [900,700,400,200,90,40,15,7.5,3,1.8,1.3,0.75,0.4,0.15]
      #bbox: [2420000.0, 1030000.0, 2900000.0, 1350000.0]
      res:  [66.1459656252646, 39.687579375158755, 26.458386250105836, 13.229193125052918, 6.614596562526459, 3.9687579375158752, 2.6458386250105836, 1.3229193125052918, 0.7937515875031751, 0.5291677250021167, 0.26458386250105836, 0.13229193125052918, 0.06614596562526459]
      bbox: [2420000.0, 1030000.0, 2900000.0, 1350000.0]
      bbox_srs: EPSG:2056
      srs: EPSG:2056
      origin: nw
      #stretch_factor: 1.10
globals:
  srs:
    axis_order_en: ['EPSG:21781', 'EPSG:2056']
    # override system projection file
    #proj_data_dir: '/path to dir that contains epsg file'

  # cache options
  cache:
    # where to store the cached images
    base_dir: './cache_data'
    # where to store lockfiles for concurrent_requests
    lock_dir: './cache_data/locks'
    # where to store lockfiles for tile creation
    tile_lock_dir: './cache_data/tile_locks'

    # request x*y tiles in one step
    meta_size: [4, 4]
    # add a buffer on all sides (in pixel) when requesting
    # new images
    meta_buffer: 80


  # image/transformation options
  image:
    # use best resampling for vector data
    resampling_method: bicubic # nearest/bilinear
    # stretch cached images by this factor before
    # using the next level
    stretch_factor: 1.15
    # shrink cached images up to this factor before
    # returning an empty image (for the first level)
    max_shrink_factor: 4.0

    # Enable 24bit PNG images. Defaults to true (8bit PNG)
    paletted: false
    formats:
      custom_format:
        format: image/png
        # the custom format will be stored as 8bit PNG
        mode: P
        colors: 32
        transparent: true
        encoding_options:
        # The algorithm used to quantize (reduce) the image colors
          quantizer: fastoctree
      # edit an existing format
      image/jpeg:
        encoding_options:
          # jpeg quality [0-100]
          jpeg_quality: 60