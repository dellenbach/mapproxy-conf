# -------------------------------
# MapProxy example configuration.
# -------------------------------
#
# This is a minimal MapProxy configuration.
# See full_example.yaml and the documentation for more options.
#

# Starts the following services:
# Demo:
#     http://localhost:8080/demo
# WMS:
#     capabilities: http://localhost:8080/service?REQUEST=GetCapabilities
# WMTS:
#     capabilities: http://localhost:8080/wmts/1.0.0/WMTSCapabilities.xml
#     first tile: http://localhost:8080/wmts/osm/webmercator/0/0/0.png
# Tile service (compatible with OSM/etc.)
#     first tile: http://localhost:8080/tiles/osm/webmercator/0/0/0.png
# TMS:
#     note: TMS is not compatible with OSM/Google Maps/etc.
#     fist tile: http://localhost:8080/tms/1.0.0/osm/webmercator/0/0/0.png
# KML:
#     initial doc: http://localhost:8080/kml/osm/webmercator

#base: ['base/globals.yaml','base/sourcesgd.yaml','base/servicewmsgd.yaml']
base: ['base/globals.yaml','base/grids.yaml']

services:
  demo:
  wms:
    # only offer WMS 1.1.1
    versions: ['1.3.0', '1.1.1']

    # supported SRS for this WMS
    srs: ['EPSG:2056']

    # force the layer extents (BBOX) to be displayed in this SRS
    bbox_srs: ['EPSG:2056']

    # limit the supported image formats.
    image_formats: ['image/jpeg', 'image/png', 'image/gif', 'image/GeoTIFF', 'image/tiff']

    # add attribution text in the lower-right corner.
    attribution:
      text: 'Rasterdaten (c) swisstopo, AV-Daten (c) GIS Daten AG'

    # return an OGC service exception when one or more sources return errors
    # or no response at all (e.g. timeout)
    on_source_errors: raise

    # some WMS clients do not send all required parameters in feature info
    # requests, MapProxy ignores these errors unless you set strict to true.
    strict: false

    # list of feature info types the server should offer
    featureinfo_types: ['text', 'xml']

    md:
      # metadata used in capabilities documents
      title: WMS Basisdaten GIS Daten AG
      abstract: WMS Dienste fuer Amt fur Landwirtschaft NW
      online_resource: https://www.gis-daten.ch
      contact:
        organization: GIS Daten AG
        address: Aemaettlistrasse 2
        city: Stans
        postcode: 6370
        country: Switzerland
        phone: +41 (0)41 618 61 12
        email: support@gis-daten.ch
      # multiline strings are possible with the right indention
      access_constraints:
        Dieser WMS darf nur fuer das Amt fuer Lanwirtschaft Nidwalden verwendet werden.

parts:
    coverages:
        bboxnw: &bboxnw
            bbox: [2643483, 1171738, 2702269, 1216819]
            srs: 'EPSG:2056'
        bboxow: &bboxow
            bbox: [2643483, 1171738, 2702269, 1216819]
            srs: 'EPSG:2056'
        bboxnwow: &bboxnwow
            bbox: [2643483, 1171738, 2702269, 1216819]
            srs: 'EPSG:2056'
        bboxlu: &bboxlu
            bbox: [2630127, 1180568, 2681764, 1237690]
            srs: 'EPSG:2056'
        bboxels: &bboxels
            bbox: [2620000, 1146000, 2724800, 1242000]
            srs: 'EPSG:2056'
        bboxclip: &bboxclip
            bbox: [2660000, 1172000, 2680000, 1200000]
            #datasource: Point(2660000, 1172000).buffer(2000)
            srs: 'EPSG:2056'

layers:
    
  - name: ch.nw.landwirtschaft
    title: Landwirtschaft NW
    sources: [ch.nw.landwirtschaft]
    # sources: [ch.nwow.orthophoto,ch.nw.landwirtschaft]
    
sources:
        
#Nidwalden und Obwalden
      ch.nwow.orthophoto:
        type: arcgis
        req:
         # layers: 1,2
          url: http://arcgis-trigonet.geocentrale.com:6080/arcgis/rest/services/gis_basis/basislayer_orthophoto/MapServer
          transparent: true
        opts:
          featureinfo: true
          featureinfo_tolerance: 10
          featureinfo_return_geometries: false
        #supported_srs: ['EPSG:2056']
        #grid: epsg_2056
        coverage: *bboxnw

#Nidwalden
        
      ch.nw.landwirtschaft:
        type: arcgis
        req:
          layers: all
          url: http://arcgis-trigonet.geocentrale.com:6080/arcgis/rest/services/gis_fach/nw_landwirtschaft/MapServer
          transparent: true
        opts:
          featureinfo: true
          featureinfo_tolerance: 10
          featureinfo_return_geometries: false
        #supported_srs: ['EPSG:2056']
        #grid: epsg_2056
        coverage: *bboxnw
        
globals:
  srs:
    axis_order_en: ['EPSG:21781', 'EPSG:2056']
    # override system projection file
    #proj_data_dir: '/path to dir that contains epsg file'

  # cache options
  cache:
    # where to store the cached images
    base_dir: './cache_data'
    # where to store lockfiles for concurrent_requests
    lock_dir: './cache_data/locks'
    # where to store lockfiles for tile creation
    tile_lock_dir: './cache_data/tile_locks'

    # request x*y tiles in one step
    meta_size: [4, 4]
    # add a buffer on all sides (in pixel) when requesting
    # new images
    meta_buffer: 80


  # image/transformation options
  image:
    # use best resampling for vector data
    resampling_method: bicubic # nearest/bilinear
    # stretch cached images by this factor before
    # using the next level
    stretch_factor: 1.15
    # shrink cached images up to this factor before
    # returning an empty image (for the first level)
    max_shrink_factor: 4.0

    # Enable 24bit PNG images. Defaults to true (8bit PNG)
    paletted: false
    formats:
      custom_format:
        format: image/png
        # the custom format will be stored as 8bit PNG
        mode: P
        colors: 32
        transparent: true
        encoding_options:
        # The algorithm used to quantize (reduce) the image colors
          quantizer: fastoctree
      # edit an existing format
      image/jpeg:
        encoding_options:
          # jpeg quality [0-100]
          jpeg_quality: 80
        
        
        
        
        
        
        
        
        