# -------------------------------
# MapProxy example configuration.
# -------------------------------
#
# This is a minimal MapProxy configuration.
# See full_example.yaml and the documentation for more options.
#

# Starts the following services:
# Demo:
#     http://localhost:8080/demo
# WMS:
#     capabilities: http://localhost:8080/service?REQUEST=GetCapabilities
# WMTS:
#     capabilities: http://localhost:8080/wmts/1.0.0/WMTSCapabilities.xml
#     first tile: http://localhost:8080/wmts/osm/webmercator/0/0/0.png
# Tile service (compatible with OSM/etc.)
#     first tile: http://localhost:8080/tiles/osm/webmercator/0/0/0.png
# TMS:
#     note: TMS is not compatible with OSM/Google Maps/etc.
#     fist tile: http://localhost:8080/tms/1.0.0/osm/webmercator/0/0/0.png
# KML:
#     initial doc: http://localhost:8080/kml/osm/webmercator

#base: ['base/globals.yaml','base/sourcesgd.yaml','base/servicewmsgd.yaml']
base: ['base/globals.yaml','base/grids.yaml']

services:
  demo:
  wms:
    # only offer WMS 1.1.1
    versions: ['1.3.0', '1.1.1']

    # supported SRS for this WMS
    srs: ['EPSG:2056','EPSG:21781','EPSG:4326','CRS:84','EPSG:3857','EPSG:900913']

    # force the layer extents (BBOX) to be displayed in this SRS
    bbox_srs: ['EPSG:2056']

    # limit the supported image formats.
    image_formats: ['image/jpeg', 'image/png', 'image/gif', 'image/GeoTIFF', 'image/tiff']

    # add attribution text in the lower-right corner.
    attribution:
      text: 'Rasterdaten (c) swisstopo, AV-Daten (c) GIS Daten AG'

    # return an OGC service exception when one or more sources return errors
    # or no response at all (e.g. timeout)
    on_source_errors: raise

    # some WMS clients do not send all required parameters in feature info
    # requests, MapProxy ignores these errors unless you set strict to true.
    strict: false

    # list of feature info types the server should offer
    featureinfo_types: ['text', 'xml']

    md:
      # metadata used in capabilities documents
      title: WMS Basisdaten GIS Daten AG
      abstract: WMS Dienste fuer ELS NW und OW
      online_resource: https://www.gis-daten.ch
      contact:
        organization: GIS Daten AG
        address: Aemaettlistrasse 2
        city: Stans
        postcode: 6370
        country: Switzerland
        phone: +41 (0)41 618 61 12
        email: support@gis-daten.ch
      # multiline strings are possible with the right indention
      access_constraints:
        Dieser WMS darf nur fuer ELS Nidwalden und Obwalden verwendet werden.

parts:
    coverages:
        bboxnw: &bboxnw
            bbox: [2643483, 1171738, 2702269, 1216819]
            srs: 'EPSG:2056'
        bboxow: &bboxow
            bbox: [2643483, 1171738, 2702269, 1216819]
            srs: 'EPSG:2056'
        bboxnwow: &bboxnwow
            bbox: [2643483, 1171738, 2702269, 1216819]
            srs: 'EPSG:2056'
        bboxlu: &bboxlu
            bbox: [2630127, 1180568, 2681764, 1237690]
            srs: 'EPSG:2056'
        bboxels: &bboxels
            bbox: [2620000, 1146000, 2724800, 1242000]
            srs: 'EPSG:2056'
        bboxclip: &bboxclip
            bbox: [2660000, 1172000, 2680000, 1200000]
            #datasource: Point(2660000, 1172000).buffer(2000)
            srs: 'EPSG:2056'

