layers:
  - name: ch.nwow.orthofoto
    title: Orthofoto Nidwalden und Obwalden
    sources:
      - ch.nwow.orthofoto
  - name: ch.ow.abwasser
    title: Abwasser Obwalden
    sources:
      - ch.ow.grundbuchplan_opaque
      - ch.ow.abwasser
  - name: ch.nwow.grundbuchplan
    title: Grundbuchplan NWOW
    sources:
      - ch.ow.grundbuchplan
      - ch.nw.grundbuchplan
sources:
  ch.nwow.orthofoto:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: all
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_basis/basislayer_orthophoto/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: false
    supported_srs:
      - 'EPSG:2056'
    coverage: *ref_0
  ch.nw.grundbuchplan:
    type: arcgis
    http:
      ssl_no_cert_checks: true
