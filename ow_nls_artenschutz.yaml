layers:
  - name: WMS OW nls artenschutz
    title: WMS OW nls artenschutz
    sources:
      - ch.WMS OW nls artenschutz
sources:
  ch.WMS OW nls artenschutz:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: 'show:32'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_fach/ow_natur_landschaftsschutz/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: false
    supported_srs:
      - 'EPSG:3857'
      - 'EPSG:2056'
      - 'EPSG:21781'
      - 'EPSG:4326'
      - 'EPSG:4258'
      - 'CRS:84'
      - 'EPSG:900913'
