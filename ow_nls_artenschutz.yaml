      - 'EPSG:3857'
      - 'EPSG:2056'
      - 'EPSG:21781'
      - 'EPSG:4326'
      - 'EPSG:4258'
      - 'CRS:84'
      - 'EPSG:900913'
  cache:
    base_dir: ./cache_data
    lock_dir: ./cache_data/locks
    tile_lock_dir: ./cache_data/tile_locks
    meta_size:
      - 4
      - 4
    meta_buffer: 80
  image:
    resampling_method: bicubic
    stretch_factor: 1.15
    max_shrink_factor: 4
    paletted: false
    formats:
      custom_format:
        format: image/png
        mode: P
        colors: 32
        transparent: true
        encoding_options:
          quantizer: fastoctree
      image/jpeg:
        encoding_options:
          jpeg_quality: 80
