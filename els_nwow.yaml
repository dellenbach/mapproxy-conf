sources:
  ch.nwow.orthophoto:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: '1,2'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_basis/basislayer_orthophoto/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *ref_0
