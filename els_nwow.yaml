base:
  - base/globals.yaml
  - base/grids.yaml
services:
  demo: null
  wms:
    versions:
      - 1.3.0
      - 1.1.1
    srs:
      - 'EPSG:2056'
    bbox_srs:
      - 'EPSG:2056'
    image_formats:
      - image/jpeg
      - image/png
      - image/gif
      - image/GeoTIFF
      - image/tiff
    attribution:
      text: ''
    on_source_errors: raise
    strict: false
    featureinfo_types:
      - text
      - xml
    md:
      title: WMS Basisdaten GIS Daten AG
      abstract: WMS Dienste fuer ELS NW und OW
      online_resource: 'https://www.gis-daten.ch'
      contact:
        organization: GIS Daten AG
        address: Aemaettlistrasse 2
        city: Stans
        postcode: 6370
        country: Switzerland
        phone: +41 (0)41 618 61 12
        email: support@gis-daten.ch
      access_constraints: Dieser WMS darf nur fuer ELS Nidwalden und Obwalden verwendet werden.
