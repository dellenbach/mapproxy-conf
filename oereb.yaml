caches:
  ch.swisstopo.swissimage.cache:
    grids: [ gisdaten_grid2056, gisdaten_grid4326, gisdaten_grid3857 ]
    # grids: [GLOBAL_WEBMERCATOR]
    sources: [ ch.swisstopo.swissimage ]
    #disable_storage: true
    #format: mixed

    # request a meta tile, that consists of m x n tiles
    meta_size: [ 6, 6 ]
    # allow to make 2 parallel requests to the sources for missing tiles
    concurrent_tile_creators: 16

    # level 0 - 13 will be cached, others are served directly from the source
    #use_direct_from_level: 12
    format: image/jpeg
    cache:
      type: compact
      version: 2
      directory: //trigopgis04.file.core.windows.net/cache/mapproxy/cache2056/ch.swisstopo.swissimage/_alllayers
#      type: sqlite
#      directory: //trigopgis04.file.core.windows.net/cache/mapproxy/ch.swisstopo.swissimage

