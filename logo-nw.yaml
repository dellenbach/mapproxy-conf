layers:
  - name: ch.nwow.basisplan-gis-farbig
    title: Basisplan GIS farbig NW/OW
    sources:
      - ch.nwow.basisplan-gis-farbig.cache
      - ch.nw.basisplan_gis_farbig
      - ch.ow.basisplan_gis_farbig
      - ch.nw_basisplan_gis_dynamisch
      - ch.ow_basisplan_gis_dynamisch    
  - name: ch.nwow.basisplan-gis-farbig_aufgehellt
    title: Basisplan GIS farbig aufgehellt (WMS)
    sources:
      - ch.nwow.basisplan-gis-farbig.cache
      - ch.nw.basisplan_gis_farbig
      - ch.ow.basisplan_gis_farbig
      - ch.nw_basisplan_gis_dynamisch
      - ch.ow_basisplan_gis_dynamisch
      - ch.aufhellungslayer_05_src
  - name: ch.swisstopo.orthophoto_aufgehellt
    title: 'Orthophoto aufgehellt (WMS)'
    sources:
      - ch.swisstopo.orthophoto_src
      - ch.aufhellungslayer_05_src
  - name: ch.swisstopo.landeskarten_farbig_aufgehellt
    title: 'Landeskarten (farbig) aufgehellt (WMS)'
    sources:
      - ch.swisstopo.landeskarten_farbig_src
      - ch.aufhellungslayer_06_src
  - name: ch.swisstopo.landeskarten_sw_aufgehellt
    title: 'Landeskarten (sw) aufgehellt (WMS)'
    sources:
      - ch.swisstopo.landeskarten_sw_src
      - ch.aufhellungslayer_06_src      
  - name: ch.nw.tempozonen
    title: 'Tempozonen (WMS)'
    sources:
      - ch.nw.tempozonen_src
  - name: ch.nw.leitungskataster
    title: Leitungskataster NW
    sources:
      - ch.nw_lkat
  - name: ch.nwow.orthophoto
    title: 'Orthophoto NW/OW'
    sources:
      - ch.nwow.orthophoto
  
      
sources:
  ch.aufhellungslayer_05_src:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: show:0
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/nw_amo/nw_amo_aufhellungslayer_fuer_wms_logo/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    #    supported_srs:
    #      - 'EPSG:2056'
    image:
      opacity: 0.5
    coverage: *bboxch
  ch.aufhellungslayer_06_src:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: show:0
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/nw_amo/nw_amo_aufhellungslayer_fuer_wms_logo/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    #    supported_srs:
    #      - 'EPSG:2056'
    image:
      opacity: 0.6
    coverage: *bboxch
  ch.swisstopo.orthophoto_src:
    http:
      ssl_no_cert_checks: true
    type: wms
    req:
      layers: ch.swisstopo.swissimage
      url: 'https://wms.geo.admin.ch/'
      transparent: true
    wms_opts:
      version: 1.3.0
      featureinfo: true
      featureinfo_tolerance: 10
    supported_srs:
      - 'EPSG:2056'
    coverage: *bboxch
  ch.swisstopo.landeskarten_farbig_src:
    http:
      ssl_no_cert_checks: true
    type: wms
    req:
      layers: ch.swisstopo.pixelkarte-farbe
      url: 'https://wms.geo.admin.ch/'
      transparent: true
    wms_opts:
      version: 1.3.0
      featureinfo: true
      featureinfo_tolerance: 10
    supported_srs:
      - 'EPSG:2056'
    coverage: *bboxch    
  ch.swisstopo.landeskarten_sw_src:
    http:
      ssl_no_cert_checks: true
    type: wms
    req:
      layers: ch.swisstopo.pixelkarte-grau
      url: 'https://wms.geo.admin.ch/'
