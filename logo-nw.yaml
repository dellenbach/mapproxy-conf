caches:
  ch.nwow.basisplan-gis-farbig.cache:
    grids:
      - epsg_2056_10000
    bulk_meta_tiles: true
    sources:
      - ch.zentralschweiz.landeskarten_smr010
      - ch.zentralschweiz.landeskarten_smr025
      - ch.zentralschweiz.landeskarten_smr050
      - ch.zentralschweiz.landeskarten_smr100
      - ch.swisstopo.pixelkarte-farbe-pk500.noscale
    cache:
      type: compact
      version: 2
grids:
  webmercator:
    base: GLOBAL_WEBMERCATOR
  epsg_2056_10000:
    res:
      - 500
      - 250
      - 100
      - 50
      - 20
      - 10
      - 5
      - 2.5
      - 2
      - 1.5
    bbox:
      - 2480000
      - 1062000
      - 2865000
      - 1302000
    bbox_srs: 'EPSG:2056'
    srs: 'EPSG:2056'
    origin: nw
globals:
  srs:
    axis_order_en:
      - 'EPSG:21781'
      - 'EPSG:2056'
  cache:
    base_dir: /mapproxy/cache_data
    lock_dir: /mapproxy/cache_data/locks
    tile_lock_dir: /mapproxy/cache_data/tile_locks
    meta_size:
      - 4
      - 4
    meta_buffer: 80
  image:
    resampling_method: bicubic
    stretch_factor: 1.15
    max_shrink_factor: 4
    paletted: false
    formats:
      custom_format:
        format: image/png
        mode: P
        colors: 32
        transparent: true
        encoding_options:
          quantizer: fastoctree
      image/jpeg:
        encoding_options:
          jpeg_quality: 60
