layers:
  - name: ch.zentralschweiz.landeskarten_smr200
    title: 'Swiss Map Raster 1:200000'
    sources:
      - ch.zentralschweiz.landeskarten_smr200
sources:
  ch.zentralschweiz.landeskarten_smr200:
    type: arcgis
    http:
      ssl_no_cert_checks: true
    req:
      layers: '1,2'
      url: >-
        https://gisdaten-ags-01.gisdaten.local:6443/arcgis/rest/services/gis_basis/swiss_map_raster_200_relief/MapServer
      transparent: true
    opts:
      featureinfo: true
      featureinfo_tolerance: 10
      featureinfo_return_geometries: true
    supported_srs:
      - 'EPSG:2056'
    coverage: *ref_0
globals:
  srs:
    axis_order_en:
      - 'EPSG:21781'
      - 'EPSG:2056'
  cache:
    base_dir: ./cache_data
    lock_dir: ./cache_data/locks
    tile_lock_dir: ./cache_data/tile_locks
    meta_size:
      - 4
      - 4
    meta_buffer: 80
  image:
    resampling_method: bicubic
    stretch_factor: 1.15
    max_shrink_factor: 4
    paletted: false
    formats:
      custom_format:
        format: image/png
        mode: P
        colors: 32
        transparent: true
        encoding_options:
          quantizer: fastoctree
      image/jpeg:
        encoding_options:
          jpeg_quality: 60
