base:
  - base/globals.yaml
  - base/grids.yaml
services:
  demo: null
  wms:
    versions:
      - 1.3.0
      - 1.1.1
    srs:
      - 'EPSG:2056'
    bbox_srs:
      - 'EPSG:2056'
    image_formats:
      - image/jpeg
      - image/png
      - image/gif
      - image/GeoTIFF
      - image/tiff
    attribution:
      text: 'Rasterdaten (c) swisstopo, AV-Daten (c) GIS Daten AG'
    on_source_errors: raise
    strict: false
    featureinfo_types:
      - text
      - xml
    md:
      title: 'Swiss Map Raster 1:200000'
      abstract: 'Swiss Map Raster 1:200000'
      online_resource: 'https://www.gis-daten.ch'
      contact:
        organization: GIS Daten AG
        address: Aemaettlistrasse 2
        city: Stans
        postcode: 6370
        country: Switzerland
        phone: +41 (0)41 618 61 12
        email: support@gis-daten.ch
      access_constraints: Dieser WMS darf nur fuer ELS Nidwalden und Obwalden verwendet werden.
parts:
  coverages:
    bboxnw:
      bbox:
        - 2643483
        - 1171738
        - 2702269
        - 1216819
      srs: 'EPSG:2056'
    bboxow:
      bbox:
        - 2643483
        - 1171738
        - 2702269
        - 1216819
      srs: 'EPSG:2056'
    bboxnwow:
      bbox:
        - 2643483
        - 1171738
        - 2702269
        - 1216819
      srs: 'EPSG:2056'
    bboxlu:
      bbox:
        - 2630127
        - 1180568
