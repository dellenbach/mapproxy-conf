parts:
    coverages:
        bboxnw: &bboxnw
            bbox: [2643483, 1171738, 2702269, 1216819]
            srs: 'EPSG:2056'
        bboxow: &bboxow
            bbox: [2643483, 1171738, 2702269, 1216819]
            srs: 'EPSG:2056'
        bboxnwow: &bboxnwow
            bbox: [2643483, 1171738, 2702269, 1216819]
            srs: 'EPSG:2056'
        bboxlu: &bboxlu
            bbox: [2630127, 1180568, 2681764, 1237690]
            srs: 'EPSG:2056'
        bboxlu: &bboxclip
            bbox: [2660000, 1172000, 2680000, 1200000]
            #datasource: Point(2660000, 1172000).buffer(2000)
            srs: 'EPSG:2056'

sources:
      ch.lu.grundbuchplan:
        type: arcgis
        req:
          layers: 1,2
          url: http://svc.geo.lu.ch/main/rest/services/basis/basis_gbplan/MapServer
          transparent: true
        opts:
          featureinfo: true
          featureinfo_tolerance: 10
          featureinfo_return_geometries: true
        supported_srs: ['EPSG:2056','EPSG:21781']
        #grid: epsg_2056
        coverage: *bboxlu

      ch.nw.grundbuchplan:
        type: arcgis
        req:
          layers: 1,2
          url: http://arcgis-trigonet.geocentrale.com:6080/arcgis/rest/services/gis_basis/plan_fuer_grundbuch_bund_nw/MapServer
          transparent: true
        opts:
          featureinfo: true
          featureinfo_tolerance: 10
          featureinfo_return_geometries: true
        supported_srs: ['EPSG:2056','EPSG:21781']
        #grid: epsg_2056
        coverage: *bboxnw

      ch.ow.grundbuchplan:
        type: arcgis
        req:
          layers: 1,2
          url: http://arcgis-trigonet.geocentrale.com:6080/arcgis/rest/services/gis_basis/plan_fuer_grundbuch_bund_ow/MapServer
          transparent: true
        opts:
          featureinfo: true
          featureinfo_tolerance: 10
          featureinfo_return_geometries: true
        supported_srs: ['EPSG:2056','EPSG:21781']
        #grid: epsg_2056
        coverage: *bboxow



